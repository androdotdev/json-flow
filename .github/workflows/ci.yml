name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm -C jsonflow-web lint

      - name: Test (engine)
        run: pnpm -C engine test

      - name: Build (engine)
        run: pnpm -C engine build

      - name: Build (web)
        run: pnpm -C jsonflow-web build
